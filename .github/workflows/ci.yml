name: CI

# Runs when commits land on main (i.e. a branch/PR is merged), plus a manual
# trigger. Feature-branch pushes are intentionally NOT built here.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The CLIP .onnx models are git-ignored (regenerated by tools/), but the
      # build only packages whatever assets exist and the unit tests use the
      # committed vocab/merges fixtures — so no models are needed to verify.
      - name: Compile + unit tests
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
